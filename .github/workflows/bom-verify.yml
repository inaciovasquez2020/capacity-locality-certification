name: bom-verify
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "certs/bom/**"
      - "tools/bom/**"
  pull_request:
    paths:
      - "certs/bom/**"
      - "tools/bom/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - run: python tools/bom/verify_bom_cert.py certs/bom/schema/BOM_CERT.schema.json certs/bom/examples/BOM_CERT_POS_0001.json
      - run: bash tools/bom/test_bom_verify.sh
  workflow_dispatch:
